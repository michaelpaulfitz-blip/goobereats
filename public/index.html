<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Uber Eats Fresh — Prepared Meals</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
<style>
  :root{
    --green:#06C167;
    --green-dark:#05a558;
    --ink:#0d0d0d;
    --gray-1:#545454;
    --gray-2:#8a8a8a;
    --gray-3:#bdbdbd;
    --line:#ececec;
    --bg:#ededf0;
    --card:#ffffff;
    --radius:16px;
    --shadow:0 18px 50px rgba(0,0,0,.22);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg);
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:24px;
  }

  /* ---------- Phone frame ---------- */
  .phone{
    width:390px;
    height:844px;
    background:#fff;
    border-radius:44px;
    box-shadow:var(--shadow);
    position:relative;
    overflow:hidden;
    border:1px solid #e3e3e6;
    display:flex;
    flex-direction:column;
  }
  .statusbar{
    height:44px;flex:0 0 44px;
    background:#0d0d0d;color:#fff;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 26px;font-size:13px;font-weight:600;
  }
  .statusbar .dots{display:flex;gap:5px;align-items:center;}
  .statusbar .bars{display:flex;gap:2px;align-items:flex-end;height:11px;}
  .statusbar .bars i{width:3px;background:#fff;border-radius:1px;display:block;}
  .statusbar .bars i:nth-child(1){height:5px}
  .statusbar .bars i:nth-child(2){height:7px}
  .statusbar .bars i:nth-child(3){height:9px}
  .statusbar .bars i:nth-child(4){height:11px}
  .battery{width:22px;height:11px;border:1.5px solid #fff;border-radius:3px;position:relative;}
  .battery::after{content:'';position:absolute;right:-3px;top:3px;width:2px;height:5px;background:#fff;border-radius:0 1px 1px 0;}
  .battery i{position:absolute;left:1.5px;top:1.5px;bottom:1.5px;width:13px;background:#fff;border-radius:1px;}

  /* ---------- Header ---------- */
  .header{
    background:#0d0d0d;color:#fff;flex:0 0 auto;
    padding:6px 18px 14px;
  }
  .brandrow{display:flex;align-items:center;justify-content:space-between;}
  .brand{display:flex;align-items:baseline;gap:7px;font-weight:800;font-size:21px;letter-spacing:-.5px;}
  .brand .eats{color:var(--green);}
  .brand .fresh{
    font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
    background:rgba(6,193,103,.16);color:var(--green);
    padding:3px 8px;border-radius:20px;align-self:center;margin-left:2px;
  }
  .avatar{width:30px;height:30px;border-radius:50%;background:#2a2a2a;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
  .addr{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:13px;color:#d8d8d8;}
  .addr b{color:#fff;font-weight:600;}
  .addr .chev{color:var(--gray-2);font-size:11px;}

  /* ---------- Mode toggle ---------- */
  .modewrap{padding:12px 16px 6px;background:#fff;flex:0 0 auto;}
  .tagline{font-size:11.5px;color:var(--gray-1);text-align:center;margin-bottom:9px;font-weight:500;}
  .tagline b{color:var(--ink);font-weight:700;}
  .toggle{
    display:flex;background:#f1f1f3;border-radius:30px;padding:4px;position:relative;
  }
  .toggle button{
    flex:1;border:0;background:transparent;cursor:pointer;
    padding:9px 6px;border-radius:26px;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--gray-1);
    z-index:1;transition:color .2s;line-height:1.1;
  }
  .toggle button.active{color:#fff;}
  .toggle .slider{
    position:absolute;top:4px;bottom:4px;width:calc(50% - 4px);
    background:var(--green);border-radius:26px;transition:transform .25s cubic-bezier(.4,0,.2,1);
    box-shadow:0 2px 8px rgba(6,193,103,.4);
  }
  .toggle.today .slider{transform:translateX(100%);}

  .planbar{
    display:flex;align-items:center;gap:8px;justify-content:center;
    font-size:12px;color:var(--gray-1);margin-top:10px;font-weight:500;
  }
  .planbar .dot{width:5px;height:5px;border-radius:50%;background:var(--gray-3);}
  .planbar b{color:var(--ink);font-weight:700;}
  .planbar .promise{color:var(--green-dark);font-weight:700;}

  /* ---------- Filter chips ---------- */
  .chips{
    display:flex;gap:8px;overflow-x:auto;padding:12px 16px 10px;background:#fff;
    flex:0 0 auto;border-bottom:1px solid var(--line);scrollbar-width:none;
  }
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;border:1.5px solid #e3e3e3;background:#fff;color:var(--ink);
    padding:8px 14px;border-radius:30px;font-size:12.5px;font-weight:600;cursor:pointer;
    display:flex;align-items:center;gap:5px;white-space:nowrap;font-family:inherit;transition:all .15s;
  }
  .chip.emphasis{border-color:#cfeede;background:#f2fbf6;}
  .chip.active{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 2px 8px rgba(6,193,103,.3);}
  .chip .ic{font-size:13px;}
  .chip .caret{font-size:9px;opacity:.6;}

  /* ---------- Scroll content ---------- */
  .scroll{flex:1 1 auto;overflow-y:auto;background:#fafafa;}
  .scroll::-webkit-scrollbar{width:0;}
  .sectionhead{padding:16px 16px 6px;display:flex;align-items:baseline;justify-content:space-between;}
  .sectionhead h2{font-size:17px;font-weight:800;letter-spacing:-.3px;}
  .sectionhead span{font-size:12px;color:var(--gray-2);font-weight:600;}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:8px 16px 24px;}
  .card{
    background:var(--card);border-radius:var(--radius);overflow:hidden;
    border:1px solid #eee;box-shadow:0 1px 3px rgba(0,0,0,.04);display:flex;flex-direction:column;
    animation:pop .25s ease;
  }
  @keyframes pop{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .photo{height:104px;position:relative;display:flex;align-items:center;justify-content:center;font-size:42px;}
  .badge-fresh{
    position:absolute;top:8px;left:8px;background:rgba(255,255,255,.95);
    color:var(--green-dark);font-size:9px;font-weight:800;padding:3px 7px;border-radius:20px;
    display:flex;align-items:center;gap:3px;box-shadow:0 1px 4px rgba(0,0,0,.12);letter-spacing:.2px;
  }
  .add{
    position:absolute;right:8px;bottom:-14px;width:32px;height:32px;border-radius:50%;
    background:#fff;border:1px solid #e6e6e6;color:var(--ink);font-size:20px;font-weight:500;
    cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.15);
    transition:transform .12s, background .15s, color .15s;line-height:1;
  }
  .add:active{transform:scale(.88);}
  .add.in{background:var(--green);border-color:var(--green);color:#fff;font-size:14px;font-weight:700;}
  .cardbody{padding:16px 12px 12px;display:flex;flex-direction:column;gap:3px;flex:1;}
  .mname{font-size:13.5px;font-weight:700;line-height:1.2;letter-spacing:-.2px;}
  .mdesc{font-size:11px;color:var(--gray-2);line-height:1.3;margin-bottom:3px;min-height:28px;}
  .kitchen{font-size:10.5px;color:var(--gray-1);font-weight:600;}
  .meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--gray-1);margin-top:4px;flex-wrap:wrap;}
  .meta .star{color:var(--ink);font-weight:700;display:flex;align-items:center;gap:2px;}
  .meta .star .s{color:#111;}
  .meta .nutri{color:var(--gray-1);font-weight:600;}
  .priced{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
  .price{font-size:14px;font-weight:800;}
  .price .qty{font-size:11px;color:var(--green-dark);font-weight:700;margin-left:4px;}
  .empty{padding:50px 30px;text-align:center;color:var(--gray-2);font-size:13px;}
  .empty .big{font-size:34px;margin-bottom:10px;}

  /* ---------- Bottom bar ---------- */
  .bottombar{
    flex:0 0 auto;background:#fff;border-top:1px solid var(--line);
    padding:12px 16px 18px;display:flex;align-items:center;gap:12px;
  }
  .bottombar .info{flex:1;min-width:0;}
  .bottombar .info .l1{font-size:13px;font-weight:700;}
  .bottombar .info .l2{font-size:11px;color:var(--gray-2);font-weight:500;margin-top:1px;}
  .progress{height:5px;background:#eee;border-radius:4px;margin-top:6px;overflow:hidden;}
  .progress i{display:block;height:100%;background:var(--green);border-radius:4px;transition:width .3s;}
  .cta{
    background:var(--green);color:#fff;border:0;font-family:inherit;font-weight:700;font-size:14px;
    padding:13px 20px;border-radius:30px;cursor:pointer;white-space:nowrap;transition:background .15s,opacity .15s;
  }
  .cta:active{background:var(--green-dark);}
  .cta:disabled{background:#cfcfcf;cursor:default;}

  /* ---------- Cart view ---------- */
  .view{position:absolute;inset:0;background:#fafafa;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:30;}
  .view.open{transform:translateX(0);}
  .vhead{flex:0 0 auto;background:#fff;padding:14px 16px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--line);}
  .vhead .back{font-size:22px;cursor:pointer;color:var(--ink);line-height:1;width:24px;}
  .vhead h2{font-size:17px;font-weight:800;letter-spacing:-.3px;}
  .vhead .sub{font-size:11px;color:var(--gray-2);font-weight:600;}
  .vscroll{flex:1;overflow-y:auto;padding:14px 16px 20px;}
  .vscroll::-webkit-scrollbar{width:0;}

  .citem{display:flex;gap:12px;background:#fff;border:1px solid #eee;border-radius:14px;padding:10px;margin-bottom:10px;align-items:center;}
  .citem .thumb{width:54px;height:54px;border-radius:11px;flex:0 0 54px;display:flex;align-items:center;justify-content:center;font-size:26px;}
  .citem .ci-body{flex:1;min-width:0;}
  .citem .ci-name{font-size:13px;font-weight:700;line-height:1.2;}
  .citem .ci-kitchen{font-size:10.5px;color:var(--gray-2);font-weight:600;margin-top:2px;}
  .citem .ci-price{font-size:13px;font-weight:800;margin-top:4px;}
  .stepper{display:flex;align-items:center;gap:10px;background:#f3f3f3;border-radius:24px;padding:5px 6px;}
  .stepper button{width:24px;height:24px;border-radius:50%;border:0;background:#fff;font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.12);line-height:1;font-family:inherit;}
  .stepper span{font-size:13px;font-weight:700;min-width:14px;text-align:center;}

  .uberone{
    background:linear-gradient(135deg,#111 0%,#222 100%);color:#fff;border-radius:16px;
    padding:14px 16px;margin:6px 0 14px;
  }
  .uberone .uo-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .uberone .uo-brand{display:flex;flex-direction:column;gap:2px;}
  .uberone .uo-brand b{font-size:14px;font-weight:800;display:flex;align-items:center;gap:6px;}
  .uberone .uo-brand b .pill{background:var(--green);color:#0d0d0d;font-size:9px;padding:2px 6px;border-radius:10px;font-weight:800;letter-spacing:.3px;}
  .uberone .uo-brand small{font-size:11px;color:#bdbdbd;font-weight:500;}
  .switch{width:46px;height:27px;border-radius:20px;background:#555;position:relative;cursor:pointer;flex:0 0 46px;transition:background .2s;}
  .switch.on{background:var(--green);}
  .switch i{position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:transform .2s;}
  .switch.on i{transform:translateX(19px);}
  .uo-save{margin-top:10px;font-size:12px;font-weight:700;color:var(--green);display:flex;align-items:center;gap:6px;}
  .uo-upsell{margin-top:10px;font-size:12px;font-weight:600;color:#ffd9a8;display:flex;align-items:center;gap:6px;}

  .summary{background:#fff;border:1px solid #eee;border-radius:16px;padding:14px 16px;}
  .srow{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;color:var(--gray-1);font-weight:500;}
  .srow.strike{color:var(--gray-3);}
  .srow.strike .v{text-decoration:line-through;}
  .srow.save{color:var(--green-dark);font-weight:700;}
  .srow.total{border-top:1px solid var(--line);margin-top:6px;padding-top:11px;font-size:16px;font-weight:800;color:var(--ink);}
  .vfoot{flex:0 0 auto;padding:12px 16px 18px;background:#fff;border-top:1px solid var(--line);}
  .checkout{width:100%;background:var(--green);color:#fff;border:0;font-family:inherit;font-weight:800;font-size:15px;padding:15px;border-radius:30px;cursor:pointer;}
  .checkout:active{background:var(--green-dark);}

  /* ---------- Confirm ---------- */
  .confirm{position:absolute;inset:0;background:#fff;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;opacity:0;pointer-events:none;transition:opacity .3s;}
  .confirm.open{opacity:1;pointer-events:auto;}
  .confirm .check{width:84px;height:84px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:44px;margin-bottom:22px;animation:pop .4s ease;box-shadow:0 10px 30px rgba(6,193,103,.4);}
  .confirm h2{font-size:23px;font-weight:800;letter-spacing:-.4px;margin-bottom:10px;}
  .confirm p{font-size:14px;color:var(--gray-1);line-height:1.5;max-width:260px;margin-bottom:8px;}
  .confirm .detail{font-size:13px;color:var(--gray-2);background:#f5f5f5;padding:10px 16px;border-radius:12px;margin:14px 0 26px;font-weight:600;}
  .confirm .done{background:#0d0d0d;color:#fff;border:0;font-family:inherit;font-weight:700;font-size:14px;padding:13px 30px;border-radius:30px;cursor:pointer;}

  /* ---------- Filter sheet ---------- */
  .backdrop{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:50;opacity:0;pointer-events:none;transition:opacity .25s;}
  .backdrop.open{opacity:1;pointer-events:auto;}
  .sheet{position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:22px 22px 0 0;z-index:51;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);padding:8px 0 24px;}
  .sheet.open{transform:translateY(0);}
  .sheet .grab{width:38px;height:4px;background:#ddd;border-radius:3px;margin:8px auto 6px;}
  .sheet h3{font-size:16px;font-weight:800;padding:8px 20px 12px;}
  .sheet .opt{padding:14px 20px;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-top:1px solid #f3f3f3;}
  .sheet .opt:active{background:#f7f7f7;}
  .sheet .opt .ck{color:var(--green);font-weight:800;opacity:0;}
  .sheet .opt.sel .ck{opacity:1;}
  .sheet .opt.clear{color:var(--gray-2);font-weight:600;}

  .toast{position:absolute;left:50%;bottom:96px;transform:translate(-50%,20px);background:#0d0d0d;color:#fff;font-size:12.5px;font-weight:600;padding:10px 16px;border-radius:24px;z-index:60;opacity:0;transition:all .25s;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.3);}
  .toast.show{opacity:1;transform:translate(-50%,0);}

  /* ---------- Real phones: fill the screen edge-to-edge ---------- */
  @media (max-width:480px){
    body{padding:0;align-items:stretch;}
    .phone{
      width:100%;max-width:none;
      height:100vh;height:100dvh;
      border-radius:0;border:0;box-shadow:none;
    }
  }
</style>
</head>
<body>
  <div class="phone" id="phone">
    <!-- status bar -->
    <div class="statusbar">
      <span>9:41</span>
      <div class="dots">
        <div class="bars"><i></i><i></i><i></i><i></i></div>
        <span style="font-size:11px;">5G</span>
        <div class="battery"><i></i></div>
      </div>
    </div>

    <!-- header -->
    <div class="header">
      <div class="brandrow">
        <div class="brand">Uber <span class="eats">Eats</span><span class="fresh">Fresh</span></div>
        <div class="avatar">M</div>
      </div>
      <div class="addr">
        <span>📍</span><b>517 SW 98th St</b><span class="chev">▾</span>
      </div>
    </div>

    <!-- mode toggle -->
    <div class="modewrap">
      <div class="tagline"><b>No subscription.</b> Order today, or schedule a week of meals.</div>
      <div class="toggle" id="toggle">
        <div class="slider"></div>
        <button id="btnSchedule" class="active" onclick="setMode('schedule')">Schedule for the week</button>
        <button id="btnToday" onclick="setMode('today')">Get it today</button>
      </div>
      <div class="planbar" id="planbar"></div>
    </div>

    <!-- filter chips -->
    <div class="chips" id="chips"></div>

    <!-- scroll content -->
    <div class="scroll">
      <div class="sectionhead">
        <h2 id="secTitle">Meals for your goals</h2>
        <span id="secCount"></span>
      </div>
      <div class="grid" id="grid"></div>
    </div>

    <!-- bottom bar -->
    <div class="bottombar">
      <div class="info" id="barInfo"></div>
      <button class="cta" id="barCta" onclick="openCart()">View cart</button>
    </div>

    <!-- CART VIEW -->
    <div class="view" id="cartView">
      <div class="vhead">
        <div class="back" onclick="closeCart()">←</div>
        <div>
          <h2 id="cartTitle">Your weekly plan</h2>
          <div class="sub" id="cartSub"></div>
        </div>
      </div>
      <div class="vscroll" id="cartScroll"></div>
      <div class="vfoot">
        <button class="checkout" id="checkoutBtn" onclick="placeOrder()">Place order</button>
      </div>
    </div>

    <!-- CONFIRM -->
    <div class="confirm" id="confirm">
      <div class="check">✓</div>
      <h2 id="confTitle">You're all set!</h2>
      <p id="confMsg"></p>
      <div class="detail" id="confDetail"></div>
      <button class="done" onclick="resetAll()">Back to browse</button>
    </div>

    <!-- filter sheet -->
    <div class="backdrop" id="backdrop" onclick="closeSheet()"></div>
    <div class="sheet" id="sheet">
      <div class="grab"></div>
      <h3 id="sheetTitle"></h3>
      <div id="sheetOpts"></div>
    </div>

    <div class="toast" id="toast"></div>
  </div>

<script>
/* ============ DATA ============ */
const MEALS = [

  {id:4, name:"Mediterranean Chicken Bowl", kitchen:"Capitol Hill Cookhouse", rating:4.7, cal:540, protein:40, price:9.75, tags:["High Protein","Mediterranean"], desc:"Grilled chicken, hummus, olives, greens", emoji:"🥗", g:["#a8d672","#5fa83f"]},
  {id:5, name:"Thai Green Curry (Veg)", kitchen:"Green Lake Kitchen", rating:4.5, cal:450, protein:18, price:9.00, tags:["Vegetarian","Calorie Smart","Thai"], desc:"Coconut curry, tofu, seasonal veg", emoji:"🍛", g:["#bfe06a","#7bbf3a"]},
  {id:6, name:"Turkey Meatballs & Zoodles", kitchen:"SoDo Meal Co.", rating:4.6, cal:390, protein:36, price:9.25, tags:["Keto","Calorie Smart","High Protein"], desc:"Turkey meatballs over zucchini noodles", emoji:"🧆", g:["#ffb27a","#e8693f"]},
  {id:7, name:"Cajun Shrimp & Rice", kitchen:"Pike Place Prep", rating:4.8, cal:560, protein:34, price:10.50, tags:["Cajun"], desc:"Blackened shrimp, dirty rice, peppers", emoji:"🍤", g:["#ff9d8c","#e8607d"]},
  {id:8, name:"Tofu Poke Bowl", kitchen:"Ballard Kitchen Co.", rating:4.4, cal:420, protein:22, price:8.75, tags:["Vegan","Calorie Smart"], desc:"Marinated tofu, sushi rice, edamame", emoji:"🍱", g:["#c79be0","#e06aa3"]},
];

const PLAN_SIZE = 6;
const TODAY_PREMIUM = 2.00;
const DELIVERY_FEE = 4.99;          // non-member
const MEMBER_DISCOUNT_RATE = 0.05;  // 5% off food for Uber One members

const CHIPS = [
  {id:"highProtein", label:"High Protein", ic:"💪", type:"toggle", emphasis:true},
  {id:"calorieSmart", label:"Calorie Smart", ic:"🔥", type:"toggle", emphasis:true},
  {id:"proteins", label:"Proteins", type:"sheet", options:["Chicken","Beef","Seafood","Plant-based"]},
  {id:"diets", label:"Diets & Lifestyles", type:"sheet", options:["Vegetarian","Vegan","Keto"]},
  {id:"cuisines", label:"Cuisines", type:"sheet", options:["Mexican","Korean","Mediterranean","Thai","Cajun"]},
  {id:"kitchens", label:"Kitchens", type:"sheet", options:[...new Set(MEALS.map(m=>m.kitchen))]},
];

/* ============ STATE ============ */
const state = {
  mode:"schedule",
  toggles:{highProtein:false, calorieSmart:false},
  selections:{proteins:null, diets:null, cuisines:null, kitchens:null},
  cart:{},            // id -> qty
  uberOne:true,
};

/* ============ HELPERS ============ */
const $ = id => document.getElementById(id);
const money = n => "$" + (Math.round(n*100)/100).toFixed(2);
const mealPrice = m => state.mode==="today" ? m.price + TODAY_PREMIUM : m.price;
const cartCount = () => Object.values(state.cart).reduce((a,b)=>a+b,0);
const minPrice = () => Math.min(...MEALS.map(mealPrice));

function matchProtein(m, val){
  const n = m.name.toLowerCase();
  if(val==="Chicken") return n.includes("chicken");
  if(val==="Beef") return n.includes("beef");
  if(val==="Seafood") return /salmon|shrimp|poke|fish|tuna/.test(n);
  if(val==="Plant-based") return m.tags.includes("Vegetarian")||m.tags.includes("Vegan");
  return true;
}
function passes(m){
  if(state.toggles.highProtein && !m.tags.includes("High Protein")) return false;
  if(state.toggles.calorieSmart && !m.tags.includes("Calorie Smart")) return false;
  if(state.selections.proteins && !matchProtein(m, state.selections.proteins)) return false;
  if(state.selections.diets && !m.tags.includes(state.selections.diets)) return false;
  if(state.selections.cuisines && !m.tags.includes(state.selections.cuisines)) return false;
  if(state.selections.kitchens && m.kitchen !== state.selections.kitchens) return false;
  return true;
}

/* ============ RENDER: CHIPS ============ */
function renderChips(){
  const el = $("chips");
  el.innerHTML = "";
  CHIPS.forEach(c=>{
    const b = document.createElement("button");
    b.className = "chip" + (c.emphasis?" emphasis":"");
    let active=false, label=c.label;
    if(c.type==="toggle"){ active = state.toggles[c.id]; }
    else { if(state.selections[c.id]){ active=true; label=state.selections[c.id]; } }
    if(active) b.classList.add("active");
    b.innerHTML = (c.ic?`<span class="ic">${c.ic}</span>`:"") + label + (c.type==="sheet"?`<span class="caret">▾</span>`:"");
    b.onclick = ()=> c.type==="toggle" ? toggleChip(c.id) : openSheet(c.id);
    el.appendChild(b);
  });
}
function toggleChip(id){ state.toggles[id]=!state.toggles[id]; renderChips(); renderGrid(); }

/* ============ RENDER: GRID ============ */
function renderGrid(){
  const grid = $("grid");
  const list = MEALS.filter(passes);
  $("secCount").textContent = list.length + (list.length===1?" meal":" meals");
  grid.innerHTML = "";
  if(list.length===0){
    grid.style.gridTemplateColumns = "1fr";
    grid.innerHTML = `<div class="empty"><div class="big">🍽️</div>No meals match these filters.<br>Try clearing a filter.</div>`;
    return;
  }
  grid.style.gridTemplateColumns = "1fr 1fr";
  list.forEach(m=>{
    const qty = state.cart[m.id]||0;
    const card = document.createElement("div");
    card.className="card";
    card.innerHTML = `
      <div class="photo" style="background:linear-gradient(135deg,${m.g[0]},${m.g[1]})">
        <div class="badge-fresh">✓ Fresh Certified</div>
        <span>${m.emoji}</span>
        <button class="add ${qty?'in':''}" onclick="addMeal(${m.id},event)">${qty?qty:'+'}</button>
      </div>
      <div class="cardbody">
        <div class="mname">${m.name}</div>
        <div class="mdesc">${m.desc}</div>
        <div class="kitchen">${m.kitchen}</div>
        <div class="meta">
          <span class="star"><span class="s">★</span>${m.rating.toFixed(1)}</span>
          <span class="nutri">${m.cal} cal</span>
          <span class="nutri">${m.protein}g protein</span>
        </div>
        <div class="priced">
          <span class="price">${money(mealPrice(m))}${qty?`<span class="qty">×${qty}</span>`:''}</span>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

/* ============ MODE ============ */
function setMode(mode){
  state.mode = mode;
  $("toggle").classList.toggle("today", mode==="today");
  $("btnSchedule").classList.toggle("active", mode==="schedule");
  $("btnToday").classList.toggle("active", mode==="today");
  renderPlanbar(); renderGrid(); renderBar();
}
function renderPlanbar(){
  const pb = $("planbar");
  if(state.mode==="schedule"){
    pb.innerHTML = `<b>Weekly plan</b><span class="dot"></span>${PLAN_SIZE} meals<span class="dot"></span>from&nbsp;<b>${money(minPrice())}</b>/meal<span class="dot"></span><span class="promise">Arrives Mondays</span>`;
    $("secTitle").textContent = "Meals for your goals";
  } else {
    pb.innerHTML = `<span class="promise">⚡ Delivery in ~45 min</span><span class="dot"></span>ready to heat<span class="dot"></span><b>+${money(TODAY_PREMIUM)}</b>/meal`;
    $("secTitle").textContent = "Order now · delivered today";
  }
}

/* ============ CART ============ */
function addMeal(id, e){
  if(e) e.stopPropagation();
  state.cart[id] = (state.cart[id]||0)+1;
  renderGrid(); renderBar();
  const m = MEALS.find(x=>x.id===id);
  showToast(`Added ${m.name}`);
}
function changeQty(id, d){
  state.cart[id] = (state.cart[id]||0)+d;
  if(state.cart[id]<=0) delete state.cart[id];
  if(cartCount()===0){ closeCart(); renderGrid(); renderBar(); return; }
  renderCart(); renderGrid(); renderBar();
}
function renderBar(){
  const info = $("barInfo");
  const cta = $("barCta");
  const n = cartCount();
  if(state.mode==="schedule"){
    const pct = Math.min(100, (n/PLAN_SIZE)*100);
    info.innerHTML = `<div class="l1">${n} of ${PLAN_SIZE} meals selected</div>
      <div class="progress"><i style="width:${pct}%"></i></div>`;
    cta.textContent = "View plan";
  } else {
    const total = Object.entries(state.cart).reduce((a,[id,q])=>a+mealPrice(MEALS.find(m=>m.id==id))*q,0);
    info.innerHTML = `<div class="l1">${n} ${n===1?'meal':'meals'} · ${money(total)}</div>
      <div class="l2">Delivery in ~45 min</div>`;
    cta.textContent = "View cart";
  }
  cta.disabled = n===0;
}

function openCart(){
  if(cartCount()===0) return;
  renderCart();
  $("cartView").classList.add("open");
}
function closeCart(){ $("cartView").classList.remove("open"); }

function computeTotals(){
  const subtotal = Object.entries(state.cart).reduce((a,[id,q])=>a+mealPrice(MEALS.find(m=>m.id==id))*q,0);
  const member = state.uberOne;
  const deliveryFee = member ? 0 : DELIVERY_FEE;
  const discount = member ? Math.round(subtotal*MEMBER_DISCOUNT_RATE*100)/100 : 0;
  const total = subtotal - discount + deliveryFee;
  const savings = Math.round((DELIVERY_FEE + subtotal*MEMBER_DISCOUNT_RATE)*100)/100;
  return {subtotal, deliveryFee, discount, total, savings, member};
}

function renderCart(){
  const t = computeTotals();
  const n = cartCount();
  $("cartTitle").textContent = state.mode==="schedule" ? "Your weekly plan" : "Your cart";
  $("cartSub").textContent = state.mode==="schedule"
    ? `${n} of ${PLAN_SIZE} meals · arrives Mondays`
    : `${n} ${n===1?'meal':'meals'} · delivery in ~45 min`;

  const scroll = $("cartScroll");
  let html = "";
  Object.entries(state.cart).forEach(([id,q])=>{
    const m = MEALS.find(x=>x.id==id);
    html += `
      <div class="citem">
        <div class="thumb" style="background:linear-gradient(135deg,${m.g[0]},${m.g[1]})">${m.emoji}</div>
        <div class="ci-body">
          <div class="ci-name">${m.name}</div>
          <div class="ci-kitchen">${m.kitchen} · ✓ Fresh Certified</div>
          <div class="ci-price">${money(mealPrice(m))}</div>
        </div>
        <div class="stepper">
          <button onclick="changeQty(${m.id},-1)">−</button>
          <span>${q}</span>
          <button onclick="changeQty(${m.id},1)">+</button>
        </div>
      </div>`;
  });

  // Uber One card
  html += `
    <div class="uberone">
      <div class="uo-top">
        <div class="uo-brand">
          <b>Uber One <span class="pill">MEMBER</span></b>
          <small>${t.member ? "Free delivery + member pricing applied" : "Members save on every order"}</small>
        </div>
        <div class="switch ${t.member?'on':''}" onclick="toggleUberOne()"><i></i></div>
      </div>
      ${ t.member
          ? `<div class="uo-save">✓ You saved ${money(t.savings)} with Uber One on this order</div>`
          : `<div class="uo-upsell">★ Join Uber One and save ${money(t.savings)} on this order</div>` }
    </div>`;

  // summary
  html += `<div class="summary">
      <div class="srow"><span>Subtotal (${n} ${n===1?'meal':'meals'})</span><span>${money(t.subtotal)}</span></div>`;
  if(t.member){
    html += `<div class="srow save"><span>Uber One member discount</span><span>−${money(t.discount)}</span></div>
      <div class="srow strike"><span>Delivery fee</span><span class="v">${money(DELIVERY_FEE)}</span></div>
      <div class="srow save"><span>Delivery fee</span><span>FREE</span></div>`;
  } else {
    html += `<div class="srow"><span>Delivery fee</span><span>${money(t.deliveryFee)}</span></div>`;
  }
  html += `<div class="srow total"><span>Total</span><span>${money(t.total)}</span></div>
    </div>`;

  scroll.innerHTML = html;
  $("checkoutBtn").textContent = state.mode==="schedule" ? `Schedule plan · ${money(t.total)}` : `Place order · ${money(t.total)}`;
}

function toggleUberOne(){ state.uberOne = !state.uberOne; renderCart(); }

/* ============ FILTER SHEET ============ */
function openSheet(id){
  const c = CHIPS.find(x=>x.id===id);
  $("sheetTitle").textContent = c.label;
  const opts = $("sheetOpts");
  let html = "";
  c.options.forEach((o,i)=>{
    const sel = state.selections[id]===o;
    html += `<div class="opt ${sel?'sel':''}" onclick="pickOption('${id}',${i})">${o}<span class="ck">✓</span></div>`;
  });
  if(state.selections[id]) html += `<div class="opt clear" onclick="pickOption('${id}',-1)">Clear filter</div>`;
  opts.innerHTML = html;
  $("backdrop").classList.add("open");
  $("sheet").classList.add("open");
}
function pickOption(id, i){
  const c = CHIPS.find(x=>x.id===id);
  state.selections[id] = (i<0) ? null : c.options[i];
  closeSheet(); renderChips(); renderGrid();
}
function closeSheet(){ $("backdrop").classList.remove("open"); $("sheet").classList.remove("open"); }

/* ============ ORDER ============ */
function placeOrder(){
  const t = computeTotals();
  const n = cartCount();
  closeCart();
  if(state.mode==="schedule"){
    $("confTitle").textContent = "Your week is scheduled!";
    $("confMsg").textContent = `${n} chef-prepared meals from local Seattle kitchens, arriving fresh on Monday.`;
    $("confDetail").textContent = `${n}-meal plan · ${money(t.total)}${t.member?` · saved ${money(t.savings)} with Uber One`:''}`;
  } else {
    $("confTitle").textContent = "Order placed!";
    $("confMsg").textContent = `${n} fresh ${n===1?'meal is':'meals are'} on the way — ready to heat in ~45 minutes.`;
    $("confDetail").textContent = `${money(t.total)}${t.member?` · saved ${money(t.savings)} with Uber One`:''} · arriving ~45 min`;
  }
  $("confirm").classList.add("open");
}
function resetAll(){
  state.cart = {};
  $("confirm").classList.remove("open");
  renderGrid(); renderBar();
}

/* ============ TOAST ============ */
let toastTimer;
function showToast(msg){
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"), 1400);
}

/* ============ INIT ============ */
renderChips();
renderPlanbar();
renderGrid();
renderBar();
</script>
</body>
</html>
